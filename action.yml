name: "gobump-deps"
description: "Bump Go project dependencies using lzap/gobump and open a PR"
branding:
  icon: "box"
  color: "orange"
inputs:
  go_version:
    description: "Go version to use when setup_go is true (defaults: stable)"
    required: false
    default: "stable"
  cgo_enabled:
    description: "Enable CGO environment variable"
    required: false
    default: "0"
  token:
    description: "GitHub token with permissions to push branches and open PRs; also used for optional changelog Gist (GITHUB_TOKEN / GH_TOKEN in the step environment)"
    required: true
  exec:
    description: "String to pass via gobump -exec argument (no shell expansion)"
    required: false
  exec2:
    description: "Additional string to pass via gobump -exec argument (no shell expansion)"
    required: false
  labels:
    description: "Comma-separated list of labels to add to the PR"
    required: false
  tidy:
    description: "Run go mod tidy after bumping dependencies (default: true)"
    required: false
    default: "true"
  setup_go:
    description: "Set up Go environment (default: true)"
    required: false
    default: "true"
  exec_pr:
    description: "Bash snippet run before the PR step; always succeeds. Combined stdout/stderr and exit code are appended to the commit message."
    required: false
  pr:
    description: "Create a pull request with the changes"
    required: false
    default: "true"
  development:
    description: "Run in development mode and build from the current repo (default: false)"
    required: false
    default: "false"
  changelog:
    description: "Fetch upstream git changelogs for updated modules. With per-dependency commits (default), each bump commit includes its module changelog; with -no-git, changelogs are written to changelog-dest for the PR message instead"
    required: false
    default: "false"
  include:
    description: "Space-separated list of modules to update (default: all)"
    required: false
  exclude:
    description: "Comma-separated list of modules to exclude from update"
    required: false
  commit_message:
    description: "Commit message for the PR other than 'chore: bump dependencies via gobump'"
    required: false
    default: "chore: bump dependencies via gobump"
  no_git:
    description: "If true, skip all gobump git operations (no per-dependency commits or reset/clean on failure). When false (default), each successful bump may be committed as chore(deps): update … when the work tree has no uncommitted changes."
    required: false
    default: "false"
  user_name:
    description: "Git user.name for per-dependency commits (passed to gobump -user-name)"
    required: false
    default: "Schutzbot"
  user_email:
    description: "Git user.email for per-dependency commits (passed to gobump -user-email)"
    required: false
    default: "schutzbot@gmail.com"

runs:
  using: "composite"
  steps:
    - name: Set up Go environment
      if: ${{ inputs.setup_go == 'true' }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go_version }}
        cache: 'true'
        cache-dependency-path: '**/go.sum'

    - name: Bump dependencies with latest version
      if: ${{ inputs.development == 'false' }}
      shell: bash
      env:
        GOTOOLCHAIN: local
        CGO_ENABLED: ${{ inputs.cgo_enabled }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        go version
        go env
        go run github.com/lzap/gobump@latest -no-git=${{ inputs.no_git }} -user-name="${{ inputs.user_name }}" -user-email="${{ inputs.user_email }}" -exec "${{ inputs.exec }}" -exec "${{ inputs.exec2 }}" -changelog=${{ inputs.changelog }} -changelog-dest="/tmp/changelog.txt" -exclude "${{ inputs.exclude }}" ${{ inputs.include }} | tee /tmp/bump.log

    - name: Prepare development environment
      if: ${{ inputs.development == 'true' }}
      shell: bash
      env:
        GOTOOLCHAIN: local
        CGO_ENABLED: ${{ inputs.cgo_enabled }}
      run: |
        go version
        go env
        go get -v ./...

    - name: Bump dependencies with development version
      if: ${{ inputs.development == 'true' }}
      shell: bash
      env:
        GOTOOLCHAIN: local
        CGO_ENABLED: ${{ inputs.cgo_enabled }}
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        go version
        go env
        go run . -no-git=${{ inputs.no_git }} -user-name="${{ inputs.user_name }}" -user-email="${{ inputs.user_email }}" -exec "${{ inputs.exec }}" -exec "${{ inputs.exec2 }}" -changelog=${{ inputs.changelog }} -changelog-dest="/tmp/changelog.txt" -exclude "${{ inputs.exclude }}" ${{ inputs.include }} | tee /tmp/bump.log

    - name: Run go mod tidy
      if: ${{ inputs.tidy == 'true' }}
      shell: bash
      env:
        GOTOOLCHAIN: local
        CGO_ENABLED: ${{ inputs.cgo_enabled }}
      run: |
        go mod tidy

    - name: Execute command before PR
      env:
        GOTOOLCHAIN: local
        CGO_ENABLED: ${{ inputs.cgo_enabled }}
      shell: bash
      if: ${{ inputs.exec_pr != '' }}
      run: |
        set +e
        (
        ${{ inputs.exec_pr }}
        ) > /tmp/exec_pr.log 2>&1
        pr_ec=$?
        echo "$pr_ec" > /tmp/exec_pr.exit

    - name: Prepare commit message
      id: prep_commit_msg
      shell: bash
      run: |
        multiline=false
        [[ -f /tmp/changelog.txt ]] && multiline=true
        [[ -f /tmp/exec_pr.exit ]] && multiline=true

        if [[ "$multiline" == true ]]; then
          {
            echo "commit_message<<COMMIT_MSG_EOF"
            echo "${{ inputs.commit_message }}"
            if [[ -f /tmp/changelog.txt ]]; then
              echo ""
              cat /tmp/changelog.txt
            fi
            if [[ -f /tmp/exec_pr.exit ]]; then
              echo ""
              echo "---"
              echo "exec_pr (exit $(cat /tmp/exec_pr.exit)):"
              cat /tmp/exec_pr.log
            fi
            echo "COMMIT_MSG_EOF"
          } >> "$GITHUB_OUTPUT"
        else
          echo "commit_message=${{ inputs.commit_message }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Prepare unique branch name
      id: unique_branch
      if: ${{ inputs.pr == 'true' }}
      shell: bash
      run: |
        echo "branch=$(date -u +gobump-%Y-%m-%d-%H%M%S%N)" >> "$GITHUB_OUTPUT"

    - name: Log commits and git status before PR
      if: ${{ inputs.pr == 'true' }}
      shell: bash
      run: |
        echo "=== Commits added by gobump ==="
        git log --oneline --decorate --graph origin/${{ github.ref_name }}..${{ github.ref_name }} || echo "No new commits"
        echo ""
        echo "=== Git status (uncommitted files) ==="
        git status --short --untracked-files=all

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      if: ${{ inputs.pr == 'true' }}
      with:
        token: ${{ inputs.token }}
        branch: ${{ steps.unique_branch.outputs.branch }}
        commit-message: "${{ steps.prep_commit_msg.outputs.commit_message }}"
        title: "${{ inputs.commit_message }}"
        body-path: /tmp/bump.log
        labels: ${{ inputs.labels }}
